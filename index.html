<!DOCTYPE html>

<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>

</head>

<body>
    <header>
        <h1>ELETRIZEI</h1>
        <p>Essa página destina-se as fofocas mais quentes da atualidade</p>
        <style>
            header {
                background-color: #e23535;
                color: #FFFFFF;
                text-align: center;
                max-width: 800px;
                margin: 0 auto;
                padding: 16px;
            }

            main {
                background-color: #FFFFFF;
                color: #182963;

            }

            article {
                display: flex;
            }

            img {
                width: 
                150px;
                height: 80px;
            }

            .artigo-autor {
                font-weight: bold;
            }
        </style>
    </header>

    <main>
        <article>
            <img src="imagem-blog.png"
                alt="Logotipo conceitual de tecnologia e educacao: um livro aberto de onde emerge um cérebro digital brilhante, cercado por ícones de Wi-Fi, circuitos e lâmpada de ideia. Cores em tons de azul e branco.">

            <div>
                <h2>Neymar quebra o pé e chora por seu ex, Vini Junior</h2>
                <p class="artigo-autor">Por: Cauã & Ana</p>
               
            </div>
        </article>
        <article>
            <img src="imagem-blog.png"
                alt="Logotipo conceitual de tecnologia e educacao: um livro aberto de onde emerge um cérebro digital brilhante, cercado por ícones de Wi-Fi, circuitos e lâmpada de ideia. Cores em tons de azul e branco.">

            <div>
                <h2>Meu segundo post</h2>
                <p class="artigo-autor">Por: Marcelo Paludetto</p>
               
                
            
            </div>
        </article>

    </main>
</body>

<script>
    const botoes = document.querySelectorAll("button");

    botoes.forEach(function (botao) {
        botao.addEventListener("click", botaoClicado);
        function botaoClicado() {
            console.log("fui clicado");
            let texto = botao.querySelector("span");
            texto.textContent++;
        }
    });



</script>

</html>
